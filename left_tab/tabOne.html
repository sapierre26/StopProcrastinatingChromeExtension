<div class="canvas-tracker shell">
  <header class="tracker-header">
    <div>
      <h2>Canvas Assignments</h2>
      <p id="storageStatus">Listening for saved Canvas assignment data.</p>
    </div>
  </header>

  <section class="summary" aria-label="Assignment totals">
    <div>
      <span id="openCount">0</span>
      <small>Open</small>
    </div>
    <div>
      <span id="submittedCount">0</span>
      <small>Submitted</small>
    </div>
    <div>
      <span id="overdueCount">0</span>
      <small>Overdue</small>
    </div>
  </section>

  <section id="emptyState" class="empty" hidden>
    <strong>No assignments saved yet.</strong>
    <span>Open or refresh https://canvas.calpoly.edu. The Canvas integration will scan and save assignments locally.</span>
  </section>

  <ol id="assignmentList" class="assignments" aria-label="Saved Canvas assignments"></ol>
</div>
