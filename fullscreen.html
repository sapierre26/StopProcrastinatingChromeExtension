<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alpaca Farm - Full Screen</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="fullscreen">
  <div class="fullscreen-header">
    <h1>Alpaca Farm</h1>
    <div class="topbar">
      <button id="minimizeBtn">—</button>
    </div>
  </div>
  
  <main class="app-shell">
    <nav class="tab-bar" aria-label="Extension sections">
      <button class="tab-button active" data-tab-target="tab-one">
        My Canvas
      </button>
      <button class="tab-button" data-tab-target="tab-two">
        The Farm
      </button>
    </nav>
    <section id="tab-one" class="tab-panel active"></section>
    <section id="tab-two" class="tab-panel"></section>
  </main>

  <script type="module" src="fullscreen.js"></script>
</body>
</html>
