<div class="farm-container">
  <div class="farm-header">
    <h2>The Farm</h2>
    <button id="shareFarmBtn" class="share-farm-button" type="button">
      Share
    </button>
  </div>

  <div id="farmScene" class="farm-scene sunny">

    <img
      id="farm-background" class="farm-background" src="../images/farm.jpg">

    <div id="weatherIcon" class="weather-icon">☀️</div>

    <div class="cloud cloud-one"></div>
    <div class="cloud cloud-two"></div>

    <div id="alpaca-container"></div>

    <div class="alpaca-pen">
      <div id="accessory" class="accessory"></div>
    </div>
  </div>

  <div class="farm-info">
    <p id="farmMessage"></p>
    <p id="assignmentInfo"></p>
    <p id="farmSummary"></p>
    <div id="customizationList" class="customization-list"></div>
  </div>

  <div
    id="shareFarmModal"
    class="share-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="shareFarmTitle"
    hidden
  >
    <div class="share-modal-card">
      <h3 id="shareFarmTitle">Add a title for your farm</h3>
      <p class="share-modal-description">
        This title will appear above your farm picture.
      </p>

      <label class="field-label" for="farmTitleInput">Farm title</label>
      <input
        id="farmTitleInput"
        class="text-input"
        type="text"
        maxlength="60"
        placeholder="My Alpaca Farm"
      />

      <p id="shareStatus" class="share-status" aria-live="polite"></p>

      <div class="share-modal-actions">
        <button id="cancelShareBtn" class="secondary-button" type="button">
          Cancel
        </button>
        <button id="downloadFarmBtn" class="primary-button" type="button">
          Download picture
        </button>
      </div>
    </div>
  </div>
</div>
