<div class="farm-container">
  <h2>The Farm</h2>

  <div id="farmScene" class="farm-scene cloudy" aria-label="Alpaca farm reward scene">
    <div id="weatherIcon" class="weather-icon" aria-hidden="true">☁️</div>
    <div class="cloud cloud-one" aria-hidden="true"></div>
    <div class="cloud cloud-two" aria-hidden="true"></div>
    <div class="alpaca-pen">
      <div id="accessory" class="accessory" aria-hidden="true"></div>
      <div id="alpaca" class="alpaca" aria-hidden="true">🌱</div>
    </div>
    <div class="grass" aria-hidden="true"></div>
  </div>

  <div class="farm-info">
    <p id="farmMessage">Turn in an assignment on time to grow your farm.</p>
    <p id="assignmentInfo">No Canvas assignments have been scanned yet.</p>
  </div>
</div>
